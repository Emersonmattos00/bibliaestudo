    <link rel="stylesheet" href="style.css">

    <style>
        /* ===== MENU LATERAL ESQUERDO (FIXO) ===== */
        .side-nav {
            position: fixed !important;
            top: 50% !important;
            left: 12px !important;
            transform: translateY(-50%) !important;
            z-index: 10000 !important;
            background: rgba(20, 30, 20, 0.75);
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border-radius: 16px;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            box-shadow: 4px 0 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 217, 102, 0.15);
        }

        .side-nav a {
            color: #c5a47a;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            position: relative;
            width: 44px;
            height: 44px;
        }

        .side-nav a i {
            font-size: 20px;
            transition: all 0.3s ease;
        }

        /* Tooltip que aparece ao passar o mouse - à direita do ícone */
        .side-nav a .tooltip {
            position: absolute;
            left: 58px;
            background: rgba(20, 30, 20, 0.92);
            backdrop-filter: blur(8px);
            color: #ffd966;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8);
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 217, 102, 0.2);
            letter-spacing: 0.3px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .side-nav a .tooltip::after {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            border-right: 8px solid rgba(20, 30, 20, 0.92);
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: none;
        }

        .side-nav a:hover {
            background: rgba(255, 217, 102, 0.12);
            transform: scale(1.05);
        }

        .side-nav a:hover i {
            color: #ffd966;
            transform: scale(1.1);
        }

        .side-nav a:hover .tooltip {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        .side-nav a.active {
            background: rgba(255, 217, 102, 0.15);
            border: 1px solid rgba(255, 217, 102, 0.25);
        }

        .side-nav a.active i {
            color: #ffd966;
        }

        .side-nav .divider {
            width: 30px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 217, 102, 0.2), transparent);
            margin: 4px 0;
        }

        /* ===== AJUSTE DO CONTEÚDO PRINCIPAL ===== */
        body {
            padding-top: 20px;
            margin: 0;
            background: linear-gradient(135deg, #000000d5 0%, #404241 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('assets/capa/biblia-sagrada.webp') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.10;
            pointer-events: none;
            z-index: 0;
            filter: sepia(0.3) brightness(0.9);
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 0 20px 0 80px; /* espaço para o menu lateral */
        }

        /* ===== ESTILOS EXISTENTES (modificados para remover a navbar) ===== */
        .container {
            position: relative;
        }

        .search-container {
            margin: 15px 25px;
            display: flex;
            gap: 10px;
            background: white;
            border-radius: 40px;
            padding: 5px 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            border: 1px solid #e0c48b;
        }
        .search-container input {
            flex: 1;
            border: none;
            padding: 10px 5px;
            outline: none;
            font-size: 1rem;
            background: transparent;
        }
        .search-container button {
            background: #8b4513;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-container button:hover {
            background: #5c3a21;
        }
        .search-results {
            position: absolute;
            top: 110px;
            right: 30px;
            width: 320px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e0c48b;
        }
        .search-results.show {
            display: block;
        }
        .search-result-item {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;

        }
        .page-title-bar .nav-hino-btn:hover {

        }

        .hino-title-page {

            text-align: center;
            margin-top: 25%;
            border-bottom: 2px solid #d4af37;

        .estrofe {

        .refrao {

            color: #8b4513;
            margin: 0.8rem 0 0.8rem 1.5rem;
            padding-left: 1rem;
            border-left: 3px solid #d4af37;
        }
        .numero-hino {

        }
        .compositor {

            margin-top: 8px;
            font-style: italic;
        }

        /* Slider de páginas */
        .slider-container {
            margin: 10px 25px;
            padding: 8px 0;
        }
        .slider-container label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #e4d5b8;
            margin-bottom: 5px;
        }
        #slider { width: 100%; margin: 8px 0; }
        .ui-slider { background: #e0c48b; border-radius: 10px; height: 8px; }
        .ui-slider .ui-slider-handle {
            width: 6px; height: 6px;
            margin-left: 1px;
            background: #8b4513; border-radius: 50%;
            border: none; cursor: pointer;
            top: 0px;
        }
        .ui-slider .ui-slider-range { background: #d4af37; border-radius: 10px; }
        .ui-slider .ui-slider-handle:focus { outline: none; }

        .hidden { display: none; }

        .page-number {
            position: absolute;

        /* Responsividade */
        @media (max-width: 768px) {
            .main-container { padding: 0 15px 0 70px; }
            .side-nav { left: 6px !important; padding: 8px 6px; gap: 4px; }
            .side-nav a { width: 36px; height: 36px; padding: 6px 8px; font-size: 16px; }
            .side-nav a i { font-size: 16px; }
            .side-nav a .tooltip { font-size: 11px; left: 48px; padding: 4px 10px; }
            .page-title-bar { flex-direction: column; align-items: stretch; text-align: center; }
            .page-title-bar .title-right { justify-content: center; }
            .scroll-left { left: -10px; width: 35px; height: 35px; font-size: 16px; }
            .scroll-right { right: -10px; width: 35px; height: 35px; font-size: 16px; }
            .search-container { margin: 10px 10px; }
            .search-results { right: 10px; width: 280px; top: 100px; }
        }
        @media (max-width: 480px) {
            .main-container { padding: 0 10px 0 60px; }
            .side-nav { left: 4px !important; padding: 6px 4px; border-radius: 12px; }
            .side-nav a { width: 32px; height: 32px; padding: 4px 6px; font-size: 14px; }
            .side-nav a i { font-size: 14px; }
            .side-nav a .tooltip { font-size: 10px; left: 40px; padding: 3px 8px; }
            .page-title-bar .title-left { font-size: 1rem; }
            .page-title-bar .title-left i { font-size: 1.4rem; }
            .scroll-left { left: -5px; width: 30px; height: 30px; font-size: 14px; }
            .scroll-right { right: -5px; width: 30px; height: 30px; font-size: 14px; }
            .search-container { flex-wrap: wrap; padding: 8px 12px; }
            .search-container input { font-size: 0.9rem; padding: 6px 5px; }

        }

    <!-- ===== CONTEÚDO PRINCIPAL ===== -->

        <div class="container">

            <!-- Barra de título (substitui a navbar) -->

                    <i class="fas fa-harp"></i>

                </div>

                    <select id="selector-hino" class="selector-livro">

                    </select>

            <!-- Busca -->

                </div>

                </button>

            <div class="slider-container">
                <label>
                    <span><i class="fas fa-book-open"></i> Página <span id="pagina-atual-slider">1</span></span>
                    <span><span id="pagina-total-slider">0</span> páginas</span>

            </div>

    <div id="medidor" style="position: absolute; visibility: hidden; width: 420px; pointer-events: none; font-family: inherit; line-height: 1.5;"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="turn.min.js"></script>
    <script src="dados/harpa-dados.js"></script>

    <script>
        let flipbook = null;
        let hinosDatabase = [];
        let paginaPorHino = {};
        let hinoPorPagina = [];
        let paginaAtual = 1;
        const LIMITE_ALTURA = 750;
        let hinoAtualNumero = 1;

        // ============================================================
        // FUNÇÃO ATUALIZAR BOTÕES E INFORMAÇÕES
        // ============================================================
        function atualizarBotoes() {
            if (!flipbook) return;
            const current = flipbook.turn('page');
            const total = flipbook.turn('pages');

            $('#scroll-left').toggleClass('hidden', current <= 1);
            $('#scroll-right').toggleClass('hidden', current >= total);

            $('#pagina-atual-slider').text(current);
            $('#pagina-total-slider').text(total);

            if ($('#slider').data('uiSlider')) {
                $('#slider').slider('option', 'max', total);
                $('#slider').slider('value', current);
            }

            // Atualiza o contador de hinos
            const hinoNum = hinoPorPagina[current];
            if (hinoNum) {
                hinoAtualNumero = hinoNum;
                const hino = hinosDatabase.find(h => h.numero === hinoNum);
                if (hino) {
                    $('#hino-counter').text(`🎵 Hino ${hinoNum} - ${hino.titulo}`);
                } else {
                    $('#hino-counter').text(`🎵 Hino ${hinoNum}`);
                }
                // Atualiza o selector
                $('#selector-hino').val(hinoNum);
            } else if (current === 1) {
                $('#hino-counter').text('📖 Capa da Harpa Cristã');
            } else if (current === 2) {
                $('#hino-counter').text('📜 Verso da Capa');
            } else if (current === total - 1) {
                $('#hino-counter').text('🙏 Anteverso');
            } else if (current === total) {
                $('#hino-counter').text('🔚 Contracapa');
            }

            updateDepth(flipbook, current);
            paginaAtual = current;
        }

        // ============================================================
        // FUNÇÃO DE PROFUNDIDADE (DEPTH)
        // ============================================================
        function updateDepth(book, newPage) {
            if (!book || !book.turn) return;
            var page = book.turn('page');
            var pages = book.turn('pages');
            if (!pages || pages === 0) return;

            var depthWidth = 16 * Math.min(1, page * 2 / pages);
            var frontSide = $('.ej-book .front-side .depth');
            if (frontSide.length) {
                if (page > 3) {
                    frontSide.css({ width: depthWidth + 'px', left: (20 - depthWidth) + 'px' });
                } else { frontSide.css({ width: '0px' }); }
            }

            depthWidth = 16 * Math.min(1, (pages - page) * 2 / pages);
            var backSide = $('.ej-book .back-side .depth');
            if (backSide.length) {
                if (page < pages - 3) {
                    backSide.css({ width: depthWidth + 'px', right: (20 - depthWidth) + 'px' });
                } else { backSide.css({ width: '0px' }); }
            }
        }

        // ============================================================
        // FUNÇÕES AUXILIARES DE MEDIÇÃO E DIVISÃO DE PÁGINAS
        // ============================================================
        function calcularAlturaBloco(html) {
            const medidor = document.getElementById("medidor");
            medidor.innerHTML = html;
            const altura = medidor.scrollHeight;
            medidor.innerHTML = "";
            return altura;
        }

        function processarLetra(letra) {
            const linhas = letra.split(/\r?\n/);
            const blocos = [];
            let blocoAtual = [];
            let isRefrao = false;

            for (let linha of linhas) {
                linha = linha.trim();
                if (linha === '') {
                    if (blocoAtual.length > 0) {
                        blocos.push({
                            tipo: isRefrao ? 'refrao' : 'estrofe',
                            conteudo: blocoAtual.join('<br>')
                        });
                        blocoAtual = [];
                        isRefrao = false;
                    }
                    continue;
                }

                const linhaLower = linha.toLowerCase();
                if (linhaLower.startsWith('refrão') || linhaLower.startsWith('coro') || linhaLower === 'refrão') {
                    if (blocoAtual.length > 0) {
                        blocos.push({
                            tipo: isRefrao ? 'refrao' : 'estrofe',
                            conteudo: blocoAtual.join('<br>')
                        });
                        blocoAtual = [];
                    }
                    isRefrao = true;
                    continue;
                }

                blocoAtual.push(linha);
            }

            if (blocoAtual.length > 0) {
                blocos.push({
                    tipo: isRefrao ? 'refrao' : 'estrofe',
                    conteudo: blocoAtual.join('<br>')
                });
            }

            return blocos;
        }

        function dividirHinoEmPaginas(blocos, alturaMaxColuna) {
            let index = 0;
            let paginas = [];
            const alturaMax = alturaMaxColuna || LIMITE_ALTURA;

            while (index < blocos.length) {
                const colEsq = [],
                    colDir = [];
                let altEsq = 0,
                    altDir = 0;

                while (index < blocos.length) {
                    const bloco = blocos[index];
                    const classe = bloco.tipo === 'refrao' ? 'refrao' : 'estrofe';
                    const htmlTeste = `<div class="${classe}">${bloco.conteudo}</div>`;
                    const alturaBloco = calcularAlturaBloco(htmlTeste);

                    if (altEsq + alturaBloco <= alturaMax) {
                        colEsq.push(bloco);
                        altEsq += alturaBloco;
                        index++;
                    } else break;
                }

                while (index < blocos.length) {
                    const bloco = blocos[index];
                    const classe = bloco.tipo === 'refrao' ? 'refrao' : 'estrofe';
                    const htmlTeste = `<div class="${classe}">${bloco.conteudo}</div>`;
                    const alturaBloco = calcularAlturaBloco(htmlTeste);

                    if (altDir + alturaBloco <= alturaMax) {
                        colDir.push(bloco);
                        altDir += alturaBloco;
                        index++;
                    } else break;
                }

                let htmlEsq = colEsq.map(b =>
                    `<div class="${b.tipo === 'refrao' ? 'refrao' : 'estrofe'}">${b.conteudo}</div>`).join('');
                let htmlDir = colDir.map(b =>
                    `<div class="${b.tipo === 'refrao' ? 'refrao' : 'estrofe'}">${b.conteudo}</div>`).join('');

                if (!htmlEsq && !htmlDir) {
                    htmlEsq = '<div style="text-align:center; color:#999;">—</div>';
                }
                if (!htmlDir) htmlDir = '<div style="text-align:center; color:#999;">—</div>';

                paginas.push({
                    html: `<div class="conteudo-duas-colunas" style="font-size: 0.7rem;"><div class="coluna">${htmlEsq}</div><div class="coluna">${htmlDir}</div></div>`,
                    temConteudo: true
                });
            }

            return paginas;
        }

        // ============================================================
        // GERAÇÃO DA ESTRUTURA COMPLETA DO FLIPBOOK (HARPA)
        // ============================================================
        function gerarEstruturaFlipbook() {
            const paginasHtml = [];
            let contadorPaginas = 3;

            // Capa
            paginasHtml.push(`<div depth="5" class="hard" style="background-image: url('assets/capa/harpa.webp') !important; background-repeat: no-repeat; background-size: cover; background-position: center;">
                <div class="side"></div>
                <div class="capa-conteudo"></div>
            </div>`);

            // Verso da capa
            paginasHtml.push(`<div depth="5" class="hard front-side" style="position: relative;">
                <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url('assets/capa/versoharpa.webp'); background-repeat: no-repeat; background-size: cover; z-index: 0;"></div>
                <div class="depth"></div>
                <div class="verso-capa-conteudo" style="position: relative; z-index: 2; color: black;">
                    <p style="font-size:60px; font-weight:bold; font-family: 'OldeEnglish'; color:#2c3e50; border-bottom:3px solid #d4af37; display:inline-block; padding-bottom:8px;">Harpa Cristã</p><br>
                    <div style="text-align:left; max-width:550px; margin:25px auto 0; border-radius:12px; padding:20px;">
                        <div style="margin-bottom:25px; margin-left: 30px;">
                            <p style="font-size:16px; font-weight:bold; color:#8b4513; margin-bottom:8px;">🎵 SOBRE ESTE HINÁRIO:</p>
                            <div style="padding-left:10px; font-size:12px;">
                                <p style="margin:5px 0;">• <strong>Harpa Cristã</strong> – O hinário oficial das Assembleias de Deus no Brasil</p>
                                <p style="margin:5px 0;">• <strong>Primeira edição</strong> – 1922</p>
                                <p style="margin:5px 0;">• <strong>Total de hinos</strong> – ${hinosDatabase.length} hinos e cânticos espirituais</p>
                                <p style="margin:5px 0;">• <strong>Organizadores</strong> – Gunnar Vingren, Daniel Berg e outros pioneiros</p>
                                <p style="margin:5px 0;">• <strong>Doutrina</strong> – Baseada na Bíblia Sagrada e na experiência pentecostal</p>
                            </div>
                        </div>
                        <div style="margin-top:20px; border-top:1px dashed #ddd; padding-top:15px; margin-left: 30px;">
                            <p style="font-size:16px; font-weight:bold; color:#8b4513; margin-bottom:8px;">✨ HINO-CHAVE:</p>
                            <div style="padding-left:15px; font-size:12px;">
                                <p style="margin:8px 0; padding:10px; border-radius:8px; border-left:4px solid #d4af37;">
                                    <strong>Hino 1 - Chuvas de Graça</strong><br>
                                    "Chuvas de graça, chuvas pedimos, Senhor; Manda-nos chuvas constantes, chuvas do Consolador."
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`);

            // Hinos
            for (let i = 0; i < hinosDatabase.length; i++) {
                const hino = hinosDatabase[i];
                const numero = hino.numero;
                const titulo = hino.titulo;
                const letra = hino.letra;

                paginaPorHino[numero] = contadorPaginas;
                paginasHtml.push(`
        <div class="own-size" data-hino="${numero}" data-pagina-inicial="true">
            <div class="page-content">
                <div class="pagina-biblia" style="text-align:center;">
                    <span style="font-size:64px;color:#8b7355; margin-top: 5%; display:block;">${numero}</span>
                    <div class="hino-title-page" style="font-size:35px; margin-top: 5%;">${titulo}</div><br>
                    <p style="margin-top:5%; margin-left:10px; margin-right: 40px;">"Louvarei ao Senhor em todo o tempo; o seu louvor estará continuamente na minha boca."</p>
                    <p style="margin-top:1%;">Salmos 34:1</p>
                    <div class="compositor">Harpa Cristã</div>
                </div>
            </div>
            <div class="page-number">${contadorPaginas}</div>
        </div>
    `);
                hinoPorPagina[contadorPaginas] = numero;
                contadorPaginas++;

                const blocos = processarLetra(letra);
                const paginasHino = dividirHinoEmPaginas(blocos, LIMITE_ALTURA);

                for (let j = 0; j < paginasHino.length; j++) {
                    const pagina = paginasHino[j];
                    const isContinuacao = j > 0;

                    paginasHtml.push(`<div class="own-size" data-hino="${numero}" data-pagina-hino="${j+1}">
                        <div class="page-content">
                            <div class="pagina-biblia">
                                <div class="cabecalho-pagina">
                                    <span class="referencia">
                                        <i class="fas fa-music"></i> ${titulo}
                                    </span>
                                    ${isContinuacao ? '<span style="margin-left:20px; font-style:italic;">Continuação</span>' : ''}
                                </div>
                                ${pagina.html}
                                <div class="footnote" style="margin-top:15px; font-size:10px; color:#8b4513; border-top:1px dashed #e0c48b; padding-top:5px;">Hino ${numero} - ${titulo}
                                </div>
                            </div>
                        </div>
                        <div class="page-number">${contadorPaginas}</div>
                    </div>`);

                    hinoPorPagina[contadorPaginas] = numero;
                    contadorPaginas++;
                }
            }

            // Página em branco se necessário
            if ((paginasHtml.length + 2) % 2 !== 0) {
                paginasHtml.push(`<div class="own-size blank-page">
                    <div class="page-content">
                        <div class="pagina-biblia">
                            <div style="text-align:center;padding:40px 20px;">
                                <i class="fas fa-harp" style="font-size:64px;color:#8b7355;"></i>
                                <p style="margin-top:30px;">"Cantai ao Senhor um cântico novo, cantai ao Senhor, todas as terras."</p>
                                <p style="margin-top:20px;">Salmos 96:1</p>
                            </div>
                        </div>
                    </div>
                    <div class="page-number">${contadorPaginas}</div>
                </div>`);
                contadorPaginas++;
            }

            // Antecapa
            paginasHtml.push(`<div class="hard fixed back-side" style="position: relative;">
                <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url('assets/capa/anteversoharpa.webp'); background-repeat: no-repeat; background-size: cover; z-index: 0;"></div>
                <div class="depth"></div>
                <div class="anteverso-conteudo" style="position: relative; z-index: 2; color: black; text-align:center; padding:40px;">
                    <i class="fas fa-church" style="font-size:48px;"></i>
                    <h3 style="font-size:28px; margin-top: 1%;">Soli Deo Gloria</h3>
                    <p style="margin-top:5%; margin-left:10px; margin-right: 40px;">"Falando entre vós com salmos, hinos e cânticos espirituais, cantando e salmodiando ao Senhor no vosso coração."</p>
                    <p style="margin-top:1%;">Efésios 5:19</p>
                </div>
                <div class="page-number">${contadorPaginas}</div>
            </div>`);
            contadorPaginas++;

            // Contracapa
            paginasHtml.push(`<div class="hard" style="background-image: url('assets/capa/contracapaharpa.webp') !important; background-repeat: no-repeat; background-size: cover; background-position: center;">
                <div class="page-number">${contadorPaginas}</div>
            </div>`);

            return paginasHtml;
        }

        // ============================================================
        // CARREGAR E INICIALIZAR FLIPBOOK
        // ============================================================
        function carregarFlipbook() {
            const container = $('.ej-book');
            if (flipbook && container.data('turn')) {
                try { flipbook.turn('destroy'); } catch (e) {}
            }
            container.empty();

            const paginasHtml = gerarEstruturaFlipbook();
            paginasHtml.forEach(p => container.append(p));

            const totalPaginas = paginasHtml.length;
            $("#slider").slider({
                min: 1,
                max: totalPaginas,
                value: 3,
                slide: function(e, ui) {
                    if (flipbook) {
                        flipbook.turn('page', ui.value);
                    }
                }
            });

            flipbook = container.turn({
                width: 960,
                height: 600,
                autoCenter: true,
                display: 'double',
                acceleration: true,
                gradients: true,
                elevation: 50,
                when: {
                    turning: function(e, page, view) {
                        var book = $(this);
                        var pages = book.turn('pages');

                        if (page >= 2)
                            $('.ej-book .front-side').addClass('fixed');
                        else
                            $('.ej-book .front-side').removeClass('fixed');

                        if (page < pages)
                            $('.ej-book .back-side').addClass('fixed');
                        else
                            $('.ej-book .back-side').removeClass('fixed');

                        updateDepth(book, page);
                    },
                    turned: function(e, page) {
                        updateDepth($(this));
                        atualizarBotoes();
                    }
                }
            });

            setTimeout(() => {
                if (flipbook?.data('turn')) {
                    flipbook.turn('page', 3);
                    atualizarBotoes();
                    setTimeout(() => {
                        updateDepth(flipbook, flipbook.turn('page'));
                    }, 100);
                }
            }, 400);
        }

        // ============================================================
        // FUNÇÕES DE NAVEGAÇÃO
        // ============================================================
        function navegarParaHino(numeroHino) {
            const paginaDestino = paginaPorHino[numeroHino];
            if (paginaDestino && flipbook) {
                flipbook.turn('page', paginaDestino);
                return true;
            }
            return false;
        }

        function proximoHino() {
            const paginaAtual = flipbook ? flipbook.turn('page') : 3;
            const hinoAtual = hinoPorPagina[paginaAtual];
            if (hinoAtual) {
                const indexAtual = hinosDatabase.findIndex(h => h.numero === hinoAtual);
                if (indexAtual < hinosDatabase.length - 1) {
                    navegarParaHino(hinosDatabase[indexAtual + 1].numero);
                } else {
                    alert("Você está no último hino");
                }
            }
        }

        function anteriorHino() {
            const paginaAtual = flipbook ? flipbook.turn('page') : 3;
            const hinoAtual = hinoPorPagina[paginaAtual];
            if (hinoAtual) {
                const indexAtual = hinosDatabase.findIndex(h => h.numero === hinoAtual);
                if (indexAtual > 0) {
                    navegarParaHino(hinosDatabase[indexAtual - 1].numero);
                } else {
                    alert("Você está no primeiro hino");
                }
            }
        }

        // ============================================================
        // FUNÇÃO DE BUSCA
        // ============================================================
        function buscarHinos(termo) {
            const resultados = [];
            const termoLower = termo.toLowerCase().trim();

            const numeroHino = parseInt(termoLower);
            if (!isNaN(numeroHino) && numeroHino > 0) {
                const hinoEncontrado = hinosDatabase.find(h => h.numero === numeroHino);
                if (hinoEncontrado) {
                    resultados.push(hinoEncontrado);
                    return resultados;
                }
            }

            for (const hino of hinosDatabase) {
                if (hino.titulo.toLowerCase().includes(termoLower) ||
                    hino.letra.toLowerCase().includes(termoLower)) {
                    resultados.push(hino);
                }
            }
            return resultados;
        }

        function exibirResultadosBusca(resultados, termo) {
            const $results = $('#searchResults');
            $results.empty();

            if (resultados.length === 0) {
                $results.html('<div class="search-result-item">🎵 Nenhum hino encontrado</div>');
            } else {
                let html = '';
                for (const hino of resultados) {
                    const preview = hino.letra.substring(0, 100).replace(/\n/g, ' ') + (hino.letra.length > 100 ? '…' : '');
                    html += `<div class="search-result-item" data-hino="${hino.numero}">
                                <span class="result-ref">🎵 Hino ${hino.numero} - ${hino.titulo}</span><br>
                                <small>${preview}</small>
                             </div>`;
                }
                $results.html(html);
            }
            $results.addClass('show');
        }

        // ============================================================
        // POPULAR SELECTOR DE HINOS
        // ============================================================
        function popularSelectorHinos() {
            const $select = $('#selector-hino');
            $select.empty();
            $select.append('<option value="">📖 Selecione um hino</option>');

            for (const hino of hinosDatabase) {
                $select.append(`<option value="${hino.numero}">🎵 ${hino.numero} - ${hino.titulo.substring(0, 50)}</option>`);
            }
        }

        // ============================================================
        // INICIALIZAÇÃO PRINCIPAL
        // ============================================================
        $(document).ready(() => {
            if (window.HARPA_DATA && window.HARPA_DATA.hinos && window.HARPA_DATA.hinos.length > 0) {
                hinosDatabase = window.HARPA_DATA.hinos;
                popularSelectorHinos();
                setTimeout(() => { carregarFlipbook(); }, 100);
            } else {
                console.error("Dados da Harpa não encontrados em window.HARPA_DATA");
                $('.ej-book').html('<div style="padding:50px; text-align:center;">Erro ao carregar dados da Harpa Cristã. Verifique o arquivo dados/harpa-dados.js</div>');
            }

            // Eventos
            $('#scroll-left').click(() => {
                if (! $('#scroll-left').hasClass('hidden') && flipbook) flipbook.turn('previous');
            });

            $('#scroll-right').click(() => {
                if (! $('#scroll-right').hasClass('hidden') && flipbook) flipbook.turn('next');
            });

            $('#btn-anterior-hino').click(() => { anteriorHino(); });
            $('#btn-proximo-hino').click(() => { proximoHino(); });

            $('#selector-hino').change(function() {
                const hinoNum = parseInt($(this).val());
                if (hinoNum) {
                    navegarParaHino(hinoNum);
                }
            });

            $('#searchBtn').click(() => {
                const termo = $('#searchInput').val().trim();
                if (termo === '') return;

                const numeroHino = parseInt(termo);
                if (!isNaN(numeroHino) && numeroHino > 0) {
                    const hino = hinosDatabase.find(h => h.numero === numeroHino);
                    if (hino) {
                        navegarParaHino(numeroHino);
                        $('#searchResults').removeClass('show');
                        $('#searchInput').val('');
                        return;
                    }
                }

                const resultados = buscarHinos(termo);
                exibirResultadosBusca(resultados, termo);
            });

            $('#searchInput').keypress((e) => {
                if (e.which === 13) {
                    $('#searchBtn').click();
                }
            });

            $(document).click((e) => {
                if (!$(e.target).closest('.search-container, .search-results').length) {
                    $('#searchResults').removeClass('show');
                }
            });

            $(document).on('click', '.search-result-item', function() {
                const hinoNum = $(this).data('hino');
                if (hinoNum) {
                    navegarParaHino(hinoNum);
                    $('#searchResults').removeClass('show');
                    $('#searchInput').val('');
                }
            });

            $(document).keydown(e => {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    if (! $('#scroll-left').hasClass('hidden')) flipbook?.turn('previous');
                }
                if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    if (! $('#scroll-right').hasClass('hidden')) flipbook?.turn('next');
                }
            });
        });
    </script>

</body>
