// ======================== FUNÇÕES DE ÁUDIO (DEFINIDAS PRIMEIRO) ========================
let synth = window.speechSynthesis;
let utterance = null;
let isPaused = false;

function lerPaginaAtual() {
    if (!window.flipbookManager) {
        alert('Nenhum livro carregado.');
        return;
    }
    const pagina = window.flipbookManager.getPaginaAtual();
    const $page = $(`.ej-book .own-size[data-pagina="${pagina}"]`);
    if (!$page.length) {
        alert('Página sem texto (capa/verso).');
        return;
    }
    const versiculos = $page.find('.versiculo').map(function() {
        return $(this).text().trim();
    }).get();
    if (!versiculos.length) {
        alert('Página sem versículos.');
        return;
    }
    const texto = versiculos.join('. ');
    if (synth.speaking) synth.cancel();
    utterance = new SpeechSynthesisUtterance(texto);
    utterance.lang = 'pt-BR';
    utterance.rate = 0.9;
    utterance.pitch = 1;
    utterance.onend = function() {
        $('#audioFloatBtn').html('<i class="fas fa-volume-up"></i>').removeClass('pausado');
        isPaused = false;
    };
    utterance.onerror = function() {
        $('#audioFloatBtn').html('<i class="fas fa-volume-up"></i>').removeClass('pausado');
        isPaused = false;
    };
    synth.speak(utterance);
    $('#audioFloatBtn').html('<i class="fas fa-pause"></i>').addClass('pausado');
    isPaused = false;
}

function toggleAudioFloat() {
    if (synth.speaking && !isPaused) {
        synth.pause();
        isPaused = true;
        $('#audioFloatBtn').html('<i class="fas fa-play"></i>').addClass('pausado');
    } else if (synth.speaking && isPaused) {
        synth.resume();
        isPaused = false;
        $('#audioFloatBtn').html('<i class="fas fa-pause"></i>').addClass('pausado');
    } else {
        lerPaginaAtual();
    }
}

function stopAudioFloat() {
    if (synth.speaking) synth.cancel();
    isPaused = false;
    $('#audioFloatBtn').html('<i class="fas fa-volume-up"></i>').removeClass('pausado');
}

// ======================== CLASSES ========================
class TextPaginator {
    constructor(medidorId, alturaMax) {
        this.medidor = document.getElementById(medidorId);
        this.alturaMax = alturaMax;
    }
    calcularAltura(html) {
        this.medidor.innerHTML = html;
        const altura = this.medidor.scrollHeight;
        this.medidor.innerHTML = "";
        return altura;
    }
    dividirEmColunas(versiculos) {
        let index = 0;
        const paginas = [];
        while (index < versiculos.length) {
            const colEsq = [], colDir = [];
            let altEsq = 0, altDir = 0;
            while (index < versiculos.length) {
                const html = `<div class="versiculo">${versiculos[index]}</div>`;
                const altura = this.calcularAltura(html);
                if (altEsq + altura <= this.alturaMax) {
                    colEsq.push(versiculos[index]);
                    altEsq += altura;
                    index++;
                } else break;
            }
            while (index < versiculos.length) {
                const html = `<div class="versiculo">${versiculos[index]}</div>`;
                const altura = this.calcularAltura(html);
                if (altDir + altura <= this.alturaMax) {
                    colDir.push(versiculos[index]);
                    altDir += altura;
                    index++;
                } else break;
            }
            paginas.push({ esq: colEsq, dir: colDir, isContinuacao: paginas.length > 0 });
        }
        return paginas;
    }
}

class PageBuilder {
    constructor(livroNome, dados, paginator) {
        this.livroNome = livroNome;
        this.dados = dados;
        this.paginator = paginator;
        this.capituloPaginaMap = {};
    }
    gerarCapa() {
        return `<div depth="5" class="hard" style="background-image: url('assets/capa/biblesagrada.webp') !important; background-repeat: no-repeat; background-size: cover; background-position: center;">
            <div class="side"></div>
            <div class="capa-conteudo">
                <h1 style="font-style: bold; font-family: 'OldeEnglish'; font-size: 70px; text-align: center; -webkit-text-fill-color: white; position: relative; top: 40%;margin-left: 65px; margin-right: 35px;">${this.livroNome}</h1>
            </div>
        </div>`;
    }
    gerarVersoCapa() {
        return `<div depth="5" class="hard front-side" style="position: relative;">
            <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url('assets/capa/verso.webp'); background-repeat: no-repeat; background-size: cover; z-index: 0;"></div>
            <div class="depth"></div>
            <div class="verso-capa-conteudo" style="position: relative; z-index: 2; color: black;">
                    <p style="font-size:40px; font-weight:bold; color:#2c3e50; border-bottom:3px solid #d4af37; display:inline-block; padding-bottom:5px;">Bíblia Sagrada</p><br>
                    <div style="text-align:left; max-width:550px; margin:25px auto 0; border-radius:12px; padding:20px;">
                        <h2 style="font-family: 'OldeEnglish'; font-size:35px; text-align:center;">${this.livroNome}</h2>
                        <div style="margin-bottom:25px; margin-left: 30px;">
                            <p style="font-size:16px; font-weight:bold; color:#8b4513; margin-bottom:8px;">📖 GRANDES PERSONAGENS BÍBLICOS:</p>
                            <div style="padding-left:10px; font-size:12px;">
                                <p style="margin:5px 0;">• <strong>Abraão</strong> – pai da fé</p>
                                <p style="margin:5px 0;">• <strong>Moisés</strong> – libertador e legislador</p>
                                <p style="margin:5px 0;">• <strong>Davi</strong> – homem segundo o coração de Deus</p>
                                <p style="margin:5px 0;">• <strong>Jesus Cristo</strong> – Filho de Deus, Salvador da humanidade</p>
                                <p style="margin:5px 0;">• <strong>Paulo</strong> – apóstolo dos gentios</p>
                                <p style="margin:5px 0;">• <strong>Maria</strong> – mãe de Jesus</p>
                                <p style="margin:5px 0;">• <strong>Pedro</strong> – líder dos apóstolos</p>
                                <p style="margin:5px 0;">• <strong>João</strong> – o discípulo amado</p>
                            </div>
                        </div>
                        <div style="margin-top:20px; border-top:1px dashed #ddd; padding-top:15px; margin-left: 30px;">
                            <p style="font-size:16px; font-weight:bold; color:#8b4513; margin-bottom:8px;">✨ VERSÍCULO-CHAVE:</p>
                            <div style="padding-left:15px; font-size:12px;">
                                <p style="margin:8px 0; padding:10px; border-radius:8px; border-left:4px solid #d4af37;">
                                    <strong>João 3:16</strong><br>
                                    "Porque Deus amou o mundo de tal maneira que deu o seu Filho unigênito, para que todo aquele que nele crê não pereça, mas tenha a vida eterna."
                                </p>
                            </div>
                        </div>
                    </div>
            </div>
        </div>`;
    }
    gerarPaginasConteudo() {
        let paginas = [];
        let currentPage = 3;
        const capitulos = Object.keys(this.dados).sort((a,b)=>Number(a)-Number(b));
        for (let cap of capitulos) {
            const colunas = this.paginator.dividirEmColunas(this.dados[cap]);
            for (let i = 0; i < colunas.length; i++) {
                if (i === 0) this.capituloPaginaMap[cap] = currentPage;
                const col = colunas[i];
                const titulo = `${this.livroNome} ${cap}${col.isContinuacao ? ' continuação' : ''}`;
                const html = `<div class="own-size" data-capitulo="${cap}" data-pagina="${currentPage}">
                    <div class="page-content">
                        <div class="cabecalho-pagina"><span class="referencia">${titulo}</span></div>
                        <div class="conteudo-duas-colunas">
                            <div class="coluna">${col.esq.map(v => `<div class="versiculo">${v}</div>`).join('') || '—'}</div>
                            <div class="coluna">${col.dir.map(v => `<div class="versiculo">${v}</div>`).join('') || '—'}</div>
                        </div>
                        <div class="footnote">${this.livroNome} ${cap} - Bíblia Digital</div>
                        <div class="page-number">${currentPage}</div>
                    </div>
                </div>`;
                paginas.push(html);
                currentPage++;
            }
        }
        return { paginas, ultimaPagina: currentPage - 1 };
    }
    gerarPaginaBranca(numeroPagina) {
        return `<div class="own-size blank-page">
            <div class="page-content">
                <div style="text-align:center; margin-top:40%; font-style:italic; color:#aaa;">
                    <i class="fas fa-leaf"></i>
                    <p>Procura apresentar-te a Deus aprovado, como obreiro que não tem de que se envergonhar, que maneja bem a palavra da verdade.</p>
                    <p style="font-size:0.8rem;">2 Timóteo 2:15</p>
                </div>
                <div class="page-number">${numeroPagina}</div>
            </div>
        </div>`;
    }
    gerarAnteverso() {
        return `<div class="hard fixed back-side" style="position: relative;">
        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url('assets/capa/anteverso.webp'); background-repeat: no-repeat; background-size: cover; background-position: center; z-index: 0;"></div>
        <div class="depth"></div>
        <div class="anteverso-conteudo" style="position: relative; z-index: 2; text-align: center; padding: 40px;">
            <i class="fas fa-church" style="font-size: 48px; color: black;"></i>
            <h3 style="font-size: 28px; margin-top: 20px;">Soli Deo Gloria</h3>
            <p style="margin-top: 30px;">"Eis que faço novas todas as coisas."</p>
            <p>Apocalipse 21:5</p>
        </div>
    </div>`;
    }
    gerarContracapa() {
        return `<div class="hard" style="background-image: url('assets/capa/contracapa.webp') !important; background-repeat: no-repeat !important; background-size: cover !important; background-position: center;">
            <div class="contracapa-conteudo"></div>
        </div>`;
    }
    gerarTodasPaginas() {
        let paginas = [this.gerarCapa(), this.gerarVersoCapa()];
        const { paginas: paginasConteudo, ultimaPagina } = this.gerarPaginasConteudo();
        paginas.push(...paginasConteudo);
        if (paginasConteudo.length % 2 !== 0) {
            const proximoNumero = ultimaPagina + 1;
            paginas.push(this.gerarPaginaBranca(proximoNumero));
        }
        paginas.push(this.gerarAnteverso(), this.gerarContracapa());
        return paginas;
    }
    getMapaCapituloPagina() {
        return this.capituloPaginaMap;
    }
}

class FlipbookManager {
    constructor(seletor, largura, altura) {
        this.container = $(seletor);
        this.largura = largura;
        this.altura = altura;
        this.flipbook = null;
        this.isChrome = () => navigator.userAgent.indexOf('Chrome') != -1;
    }
    carregar(paginasHtml, paginaInicial = 1) {
        if (this.flipbook) {
            try { this.flipbook.turn('destroy'); } catch(e) {}
            this.flipbook = null;
        }
        this.container.empty();
        paginasHtml.forEach(html => this.container.append(html));
        this.flipbook = this.container.turn({
            width: this.largura,
            height: this.altura,
            autoCenter: true,
            display: 'double',
            acceleration: !this.isChrome(),
            gradients: true,
            elevation: 50,
            when: {
                turning: (e, page, view) => {
                    var book = $(this.flipbook);
                    var pages = book.turn('pages');
                    if (page >= 2) $('.ej-book .front-side').addClass('fixed');
                    else $('.ej-book .front-side').removeClass('fixed');
                    if (page < pages) $('.ej-book .back-side').addClass('fixed');
                    else $('.ej-book .back-side').removeClass('fixed');
                    this.updateDepth(page);
                },
                turned: (e, page) => { this.onTurn(page); }
            }
        });
        setTimeout(() => {
            if (this.flipbook) {
                try {
                    this.flipbook.turn('page', paginaInicial);
                    const total = this.flipbook.turn('pages');
                    this.onTurn(paginaInicial);
                } catch(e) {}
            }
        }, 200);
    }
    onTurn(page) {
        if (!this.flipbook) return;
        const total = this.flipbook.turn('pages');
        $('#scroll-left').toggleClass('hidden', page <= 1);
        $('#scroll-right').toggleClass('hidden', page >= total);
        $('#pagina-atual-slider').text(page);
        $('#pagina-total-slider').text(total);
        if ($('#slider').data('uiSlider')) {
            $('#slider').slider('option', 'max', total);
            $('#slider').slider('value', page);
        }
        this.updateDepth(page);
    }
    updateDepth(page) {
        if (!this.flipbook) return;
        const pages = this.flipbook.turn('pages');
        if (!pages) return;
        const front = $('.ej-book .front-side .depth');
        if (front.length) {
            let w = 16 * Math.min(1, page * 2 / pages);
            if (page > 3) front.css({ width: w + 'px', left: (20 - w) + 'px' });
            else front.css({ width: '0px', left: '0px' });
        }
        const back = $('.ej-book .back-side .depth');
        if (back.length) {
            let w = 16 * Math.min(1, (pages - page) * 2 / pages);
            if (page < pages - 3) back.css({ width: w + 'px', right: (20 - w) + 'px' });
            else back.css({ width: '0px', right: '0px' });
        }
    }
    irParaPagina(num) { if (this.flipbook) this.flipbook.turn('page', num); }
    proximo() { if (this.flipbook) this.flipbook.turn('next'); }
    anterior() { if (this.flipbook) this.flipbook.turn('previous'); }
    primeiraPagina() { if (this.flipbook) this.flipbook.turn('page', 1); }
    ultimaPagina() { if (this.flipbook) { const total = this.flipbook.turn('pages'); this.flipbook.turn('page', total); } }
    getPaginaAtual() { return this.flipbook ? this.flipbook.turn('page') : 1; }
}

// ======================== CARREGAMENTO DE LIVRO EXTERNO COM FALLBACK ========================
let flipbookManager = null;
let dadosAtuais = null;
let capituloParaPagina = {};
let carregandoLivro = false;
let nomeLivroAtual = "";
const paginator = new TextPaginator('medidor', CONFIG.LIMITE_ALTURA);

window.flipbookManager = flipbookManager;

function carregarLivroExterno(livroId) {
    return new Promise((resolve) => {
        // Verifica se já temos o script carregado
        const existing = document.querySelector(`script[data-livro="${livroId}"]`);
        if (existing) {
            if (window.LIVRO_DATA && window.LIVRO_DATA.dados) {
                resolve(window.LIVRO_DATA);
                return;
            }
        }
        // Tenta carregar o script
        const script = document.createElement('script');
        script.src = `apolo/${livroId}.js`;
        script.dataset.livro = livroId;
        let resolved = false;
        const timeout = setTimeout(() => {
            if (!resolved) {
                console.warn(`Timeout ao carregar ${livroId}. Usando fallback.`);
                resolved = true;
                // Usa fallback se disponível
                if (FALLBACK_DATA[livroId]) {
                    resolve({ nome: NOMES_FORMATADOS[livroId] || livroId, dados: FALLBACK_DATA[livroId] });
                } else {
                    resolve({ nome: NOMES_FORMATADOS[livroId] || livroId, dados: FALLBACK_DATA["genesis"] });
                }
            }
        }, 3000);
        script.onload = () => {
            if (!resolved) {
                resolved = true;
                clearTimeout(timeout);
                if (window.LIVRO_DATA && window.LIVRO_DATA.dados) {
                    resolve(window.LIVRO_DATA);
                } else {
                    // Fallback
                    if (FALLBACK_DATA[livroId]) {
                        resolve({ nome: NOMES_FORMATADOS[livroId] || livroId, dados: FALLBACK_DATA[livroId] });
                    } else {
                        resolve({ nome: NOMES_FORMATADOS[livroId] || livroId, dados: FALLBACK_DATA["genesis"] });
                    }
                }
            }
        };
        script.onerror = () => {
            if (!resolved) {
                resolved = true;
                clearTimeout(timeout);
                console.warn(`Erro ao carregar ${livroId}. Usando fallback.`);
                if (FALLBACK_DATA[livroId]) {
                    resolve({ nome: NOMES_FORMATADOS[livroId] || livroId, dados: FALLBACK_DATA[livroId] });
                } else {
                    resolve({ nome: NOMES_FORMATADOS[livroId] || livroId, dados: FALLBACK_DATA["genesis"] });
                }
            }
        };
        document.head.appendChild(script);
    });
}

async function mudarLivro(livroId, paginaDestino = 1) {
    if (carregandoLivro) return;
    carregandoLivro = true;
    $('#searchResults').removeClass('show');
    $('#searchInput').val('');
    $('#livro-nome').text('Carregando...');
    stopAudioFloat();
    try {
        const livroData = await carregarLivroExterno(livroId);
        dadosAtuais = livroData.dados;
        nomeLivroAtual = livroData.nome || NOMES_FORMATADOS[livroId] || livroId;
        $('#livro-nome').text(nomeLivroAtual);
        const builder = new PageBuilder(nomeLivroAtual, dadosAtuais, paginator);
        const paginasHtml = builder.gerarTodasPaginas();
        capituloParaPagina = builder.getMapaCapituloPagina();
        if (!flipbookManager) {
            flipbookManager = new FlipbookManager('.ej-book', CONFIG.LARGURA, CONFIG.ALTURA);
            window.flipbookManager = flipbookManager;
        }
        flipbookManager.carregar(paginasHtml, paginaDestino);
        atualizarBotoesNavegacaoLivro();
        console.log(`Livro "${nomeLivroAtual}" carregado com sucesso.`);
    } catch (err) {
        console.error(err);
        $('#livro-nome').text('Erro');
        $('.ej-book').html(`<div class="status">Erro ao carregar livro: ${err.message}<br>Verifique o console para detalhes.</div>`);
    } finally {
        carregandoLivro = false;
    }
}

function atualizarBotoesNavegacaoLivro() {
    const $btnAnterior = $('#btn-anterior-livro');
    const $btnProximo = $('#btn-proximo-livro');
    if (livroAtualIndex <= 0) $btnAnterior.addClass('hidden-nav');
    else $btnAnterior.removeClass('hidden-nav');
    if (livroAtualIndex >= LIVROS_ORDEM.length - 1) $btnProximo.addClass('hidden-nav');
    else $btnProximo.removeClass('hidden-nav');
}

function navegarParaLivro(delta) {
    const novoIndex = livroAtualIndex + delta;
    if (novoIndex >= 0 && novoIndex < LIVROS_ORDEM.length) {
        livroAtualIndex = novoIndex;
        mudarLivro(LIVROS_ORDEM[livroAtualIndex], 1);
    }
}

function buscarNoLivroAtual(termo) {
    if (!dadosAtuais) return [];
    const resultados = [];
    const termoLower = termo.toLowerCase();
    // Busca por referência exata (ex: Gênesis 1:3)
    const refMatch = termo.match(/^(\d*\s*[a-záàâãéèêíïóôõöúçñ]+)\s+(\d+):(\d+)$/i);
    if (refMatch) {
        const livroRef = refMatch[1].toLowerCase().trim();
        const capRef = refMatch[2];
        const versRef = parseInt(refMatch[3]);
        const livroId = Object.keys(NOMES_FORMATADOS).find(key => NOMES_FORMATADOS[key].toLowerCase() === livroRef);
        if (livroId && livroId === nomeLivroAtual.toLowerCase()) {
            if (dadosAtuais[capRef] && dadosAtuais[capRef][versRef - 1]) {
                resultados.push({
                    cap: capRef,
                    vers: versRef,
                    texto: dadosAtuais[capRef][versRef - 1].substring(0, 120) + (dadosAtuais[capRef][versRef - 1].length > 120 ? '…' : '')
                });
            }
        }
    } else {
        for (let cap in dadosAtuais) {
            if (dadosAtuais.hasOwnProperty(cap) && Array.isArray(dadosAtuais[cap])) {
                for (let idx = 0; idx < dadosAtuais[cap].length; idx++) {
                    const texto = dadosAtuais[cap][idx];
                    if (texto && texto.toLowerCase().includes(termoLower)) {
                        resultados.push({ cap, vers: idx + 1, texto: texto.substring(0, 120) + (texto.length > 120 ? '…' : '') });
                    }
                }
            }
            if (resultados.length > 30) break;
        }
    }
    return resultados;
}

function executarBusca() {
    const termo = $('#searchInput').val().trim();
    if (!termo) { alert('Digite um termo para buscar ou uma referência (ex: João 3:16)'); return; }
    if (!dadosAtuais) { alert('Aguardando carregamento do livro...'); return; }
    const resultados = buscarNoLivroAtual(termo);
    const $results = $('#searchResults');
    $results.empty();
    if (resultados.length === 0) {
        $results.append('<div class="search-result-item">Nenhum versículo encontrado.</div>');
    } else {
        resultados.forEach(r => {
            $results.append(`<div class="search-result-item" data-cap="${r.cap}" data-vers="${r.vers}">
                <span class="result-ref">${nomeLivroAtual} ${r.cap}:${r.vers}</span><br>
                <small>${r.texto}</small>
            </div>`);
        });
    }
    $results.addClass('show');
}

$(document).ready(function() {
    gerarMenus();

    // Toggle menus
    $('#menuToggleAT').click(function() {
        const sidebarAT = $('#sidebarAT');
        const sidebarNT = $('#sidebarNT');
        if (sidebarAT.hasClass('open')) {
            sidebarAT.removeClass('open');
            $('#menuToggleAT').removeClass('hidden-toggle');
        } else {
            sidebarAT.addClass('open');
            sidebarNT.removeClass('open');
            $('#menuToggleAT').addClass('hidden-toggle');
            $('#menuToggleNT').removeClass('hidden-toggle');
        }
    });
    $('#menuToggleNT').click(function() {
        const sidebarNT = $('#sidebarNT');
        const sidebarAT = $('#sidebarAT');
        if (sidebarNT.hasClass('open')) {
            sidebarNT.removeClass('open');
            $('#menuToggleNT').removeClass('hidden-toggle');
        } else {
            sidebarNT.addClass('open');
            sidebarAT.removeClass('open');
            $('#menuToggleNT').addClass('hidden-toggle');
            $('#menuToggleAT').removeClass('hidden-toggle');
        }
    });

    // Teclas
    $(document).keydown(function(e) {
        if (e.key === 'Escape') {
            $('#sidebarAT, #sidebarNT').removeClass('open');
            $('#menuToggleAT, #menuToggleNT').removeClass('hidden-toggle');
        }
        if (e.key === 'ArrowLeft') flipbookManager?.anterior();
        if (e.key === 'ArrowRight') flipbookManager?.proximo();
        if (e.key === ' ' && !$(e.target).is('input, textarea, button')) {
            e.preventDefault();
            toggleAudioFloat();
        }
    });

    // Fechar menus ao clicar fora
    $(document).click(function(e) {
        if (!$(e.target).closest('#sidebarAT, #menuToggleAT')) {
            if ($('#sidebarAT').hasClass('open')) {
                $('#sidebarAT').removeClass('open');
                $('#menuToggleAT').removeClass('hidden-toggle');
            }
        }
        if (!$(e.target).closest('#sidebarNT, #menuToggleNT')) {
            if ($('#sidebarNT').hasClass('open')) {
                $('#sidebarNT').removeClass('open');
                $('#menuToggleNT').removeClass('hidden-toggle');
            }
        }
    });

    // Slider
    $("#slider").slider({
        min: 1,
        max: 1,
        value: 1,
        slide: function(e, ui) {
            if (flipbookManager) flipbookManager.irParaPagina(ui.value);
        }
    });

    // Eventos de navegação
    $('#btn-anterior-livro').click(() => navegarParaLivro(-1));
    $('#btn-proximo-livro').click(() => navegarParaLivro(1));
    $('#scroll-left').click(() => flipbookManager?.anterior());
    $('#scroll-right').click(() => flipbookManager?.proximo());

    // Busca
    $('#searchBtn').click(executarBusca);
    $('#searchInput').keypress(function(e) { if (e.which === 13) executarBusca(); });
    $(document).on('click', '.search-result-item', function() {
        const cap = $(this).data('cap');
        const paginaDestino = capituloParaPagina[cap];
        if (paginaDestino && flipbookManager) {
            flipbookManager.irParaPagina(paginaDestino);
            $('#searchResults').removeClass('show');
            $('#searchInput').val('');
        } else {
            alert(`Não foi possível localizar o capítulo ${cap}.`);
        }
    });
    $(document).click(e => {
        if (!$(e.target).closest('.search-bar, .search-results').length)
            $('#searchResults').removeClass('show');
    });

    // Áudio
    $('#audioFloatBtn').click(toggleAudioFloat);

    // Carrega o primeiro livro (Gênesis) com fallback
    livroAtualIndex = LIVROS_ORDEM.indexOf('genesis');
    setTimeout(function() {
        mudarLivro('genesis', 1);
    }, 100);
});
</script>
