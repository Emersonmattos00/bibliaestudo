<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <!-- ESTILOS DO MENU LATERAL -->
    <style>
        /* ===== MENU LATERAL GLOBAL (ÍCONES COM TOOLTIPS) ===== */
        .side-nav-global {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: fixed !important;
            top: 50% !important;
            left: 12px !important;
            transform: translateY(-50%) !important;
            z-index: 10000 !important;
            background: rgba(20, 30, 20, 0.75);
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border-radius: 16px;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            box-shadow: 4px 0 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 217, 102, 0.15);
            transition: all 0.3s ease;
            opacity: 1;
            visibility: visible;
        }

        .side-nav-global.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-50%) scale(0.9);
        }

        .side-nav-global a {
            color: #c5a47a;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            position: relative;
            width: 44px;
            height: 44px;
        }

        .side-nav-global a i {
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .side-nav-global a .tooltip {
            position: absolute;
            left: 58px;
            background: rgba(20, 30, 20, 0.92);
            backdrop-filter: blur(8px);
            color: #ffd966;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8);
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 217, 102, 0.2);
            letter-spacing: 0.3px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 10002;
        }

        .side-nav-global a .tooltip::after {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            border-right: 8px solid rgba(20, 30, 20, 0.92);
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: none;
        }

        .side-nav-global a:hover {
            background: rgba(255, 217, 102, 0.12);
            transform: scale(1.05);
        }

        .side-nav-global a:hover i {
            color: #ffd966;
            transform: scale(1.1);
        }

        .side-nav-global a:hover .tooltip {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        .side-nav-global a.active {
            background: rgba(255, 217, 102, 0.15);
            border: 1px solid rgba(255, 217, 102, 0.25);
        }

        .side-nav-global a.active i {
            color: #ffd966;
        }

        .side-nav-global .divider {
            width: 30px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 217, 102, 0.2), transparent);
            margin: 4px 0;
        }

        /* ===== MENU LATERAL DE LIVROS (AT/NT) ===== */
        .sidebar-at {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: fixed;
            left: 12px;
            top: 10px;
            width: 260px;
            height: 910px;
            color: #e4d5b8;
            z-index: 2000;
            transform: translateX(-100%);
            transition: transform 0.3s ease, opacity 0.3s ease;
            scrollbar-width: thin;
            scrollbar-color: #e4d5b8 transparent;
            backdrop-filter: blur(15px);
            border-radius: 16px;
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-at.open {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar-at h3 {
            text-align: center;
            padding: 20px;
            font-size: 1.1rem;
            border-bottom: 2px solid #e4d5b8;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            background: transparent;
            z-index: 10;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .sidebar-at h3:hover {
            color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
        }

        .sidebar-at h3 .testamento-icon {
            font-size: 1.2rem;
        }

        .sidebar-at h3 .testamento-nome {
            font-weight: bold;
        }

        .sidebar-at h3 .testamento-indicator {
            font-size: 0.65rem;
            color: #d4af37;
            opacity: 0.7;
            font-weight: normal;
            margin-top: 2px;
        }

        .menu-list-container {
            max-height: calc(100% - 100px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #e4d5b8 transparent;
        }

        .menu-list-container::-webkit-scrollbar {
            width: 8px;
        }
        .menu-list-container::-webkit-scrollbar-track {
            background: transparent !important;
        }
        .menu-list-container::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 4px;
        }
        .menu-list-container::-webkit-scrollbar-thumb:hover {
            background: #e8c84a;
        }

        .menu-list-container {
            scrollbar-color: #e4d5b8 transparent !important;
        }

        .livros-lista {
            list-style: none;
            padding: 5px 0;
        }

        .livros-lista li {
            padding: 10px 15px 10px 25px;
        }

        .livros-lista li a {
            color: #e4d5b8;
            text-decoration: none;
            display: block;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .livros-lista li a:hover {
            color: #d4af37;
            padding-left: 8px;
            font-weight: bold;
            font-size: 15px;
            text-transform: uppercase;
        }

        .livros-lista li a.ativo {
            color: #d4af37;
            font-weight: bold;
            text-transform: uppercase;
            padding-left: 8px;
            border-left: 3px solid #d4af37;
        }

        /* ===== BOTÃO TOGGLE ===== */
        .menu-toggle {
            position: fixed;
            left: 0;
            top: 10%;
            transform: translateY(-50%);
            width: 20px;
            height: 80px;
            background: #e4d5b81f;
            border: none;
            cursor: pointer;
            z-index: 2001;
            font-size: 1.2rem;
            color: #f8efda;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 10px 10px 0;
            opacity: 0.8;
        }

        .menu-toggle:hover {
            opacity: 1;
            width: 40px;
        }

        .menu-toggle.hidden-toggle {
            display: none !important;
        }

        /* ===== AJUSTE DO CONTEÚDO PRINCIPAL ===== */
        .main-content {
            padding-left: 80px !important;
        }

        /* Layout com dois painéis laterais */
        .apologetic-wrapper {
            display: flex;
            gap: 20px;
            max-width: 2000px;
            margin: 0 auto;
            padding: 5px;
            overflow: visible !important;
        }

        /* ===== ESTILOS DO FLIPBOOK ===== */
        #flipbook, .ej-book, .leitor-wrapper, .own-size, .page-content {
            z-index: 1 !important;
            position: relative;
        }

        .container {
            overflow: visible !important;
        }

        .main-container {
            flex: 1;
            min-width: 0;
            overflow: visible !important;
        }

        /* ===== PAINÉIS APOLOGÉTICOS (À DIREITA, ALTERNADOS) ===== */
        .apologetic-panel {
            width: 330px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            overflow-y: auto;
            max-height: 780px;
            position: relative;
            top: 80px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 12px 15px;
            border-radius: 16px 16px 0 0;
            color: #ffffff;
            font-weight: bold;
            font-size: 0.9rem;
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.212);
            z-index: 10;
            border-bottom: 2px solid #d4af37;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .panel-header i {
            margin-right: 8px;
        }

        .panel-header .panel-indicator {
            font-size: 0.6rem;
            opacity: 0.6;
            font-weight: normal;
        }

        .panel-header .panel-toggle-icon {
            font-size: 0.8rem;
            opacity: 0.5;
            transition: transform 0.3s ease;
        }

        .panel-content {
            padding: 12px;
            color: #e0d5c1;
            font-size: 0.8rem;
            flex: 1;
            overflow-y: auto;
        }

        .panel-section {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 12px;
        }

        .panel-section h4 {
            color: #d4af37;
            margin-bottom: 8px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .capitulo-titulo {
            background: linear-gradient(135deg, #d4af37, #b8941e);
            color: #1a1a2e;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
        }

        .capitulo-titulo i {
            margin-right: 8px;
        }

        .objecao-item, .argumento-item, .referencia-item {
            background: rgba(0,0,0,0.3);
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 2px solid #d4af37;
        }

        .objecao-questao {
            font-weight: bold;
            color: #ffaa66;
            margin-bottom: 4px;
            font-size: 0.75rem;
        }

        .objecao-resposta {
            color: #ccc;
            font-size: 0.7rem;
            line-height: 1.3;
        }

        .argumento-tipo {
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 3px;
            font-size: 0.75rem;
        }

        .versiculo-chave {
            background: rgba(212, 175, 55, 0.15);
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-style: italic;
            font-size: 0.7rem;
        }

        .versiculo-chave strong {
            color: #d4af37;
        }

        .aplicacao-item {
            padding: 5px 0;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .aplicacao-item i {
            color: #d4af37;
            font-size: 0.65rem;
        }

        .evidencia-item {
            font-size: 0.7rem;
            margin-bottom: 5px;
            padding-left: 12px;
        }

        .status {
            text-align: center;
            padding: 50px;
            color: #8b4513;
            font-style: italic;
        }

        .panel-content::-webkit-scrollbar {
            width: 8px;
        }
        .panel-content::-webkit-scrollbar-track {
            border-radius: 10px;
            background: transparent !important;
        }
        .panel-content::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 10px;
        }
        .panel-content::-webkit-scrollbar-thumb:hover {
            background: #e8c84a;
        }

        .panel-content {
            scrollbar-width: thin;
            scrollbar-color: #e4d5b8 transparent !important;
        }

        /* Barra de título (substitui a navbar) */
        .page-title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 25px;
            background: rgba(255,254,247,0.06);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            margin: 0px 25px 0 25px;
            border: 1px solid rgba(255,215,0,0.1);
            flex-wrap: wrap;
            gap: 10px;
        }
        .page-title-bar .title-left {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ffd966;
            font-size: 1.3rem;
            font-weight: bold;
        }
        .page-title-bar .title-left i {
            font-size: 1.8rem;
        }
        .page-title-bar .nav-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .page-title-bar .nav-btn {
            color: #e4d5b8;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .page-title-bar .nav-btn:hover {
            color: #ffd966;
        }
        .page-title-bar .livro-atual {
            font-size: 1.2rem;
            background: transparent;
            color: #e4d5b8;
            min-width: 150px;
            text-align: center;
        }
        .page-title-bar .nav-btn.hidden-nav {
            display: none !important;
        }

        .search-bar { margin: 15px 25px; display: flex; gap: 10px; background: white; border-radius: 40px; padding: 5px 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); border: 1px solid #e0c48b; }
        .search-bar input { flex: 1; border: none; padding: 10px 5px; outline: none; font-size: 1rem; background: transparent; }
        .search-bar button { background: #8b4513; border: none; color: white; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .search-results { position: absolute; top: 100px; right: 30px; width: 320px; background: white; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 1000; display: none; max-height: 400px; overflow-y: auto; border: 1px solid #e0c48b; }
        .search-results.show { display: block; }
        .search-result-item { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 0.85rem; }
        .search-result-item:hover { background: #f8efda; }
        .result-ref { font-weight: bold; color: #8b4513; }
        .page-number { position: absolute; bottom: 12px; right: 20px; font-size: 11px; color: #8b4513; font-family: monospace; text-align: right; }

        .slider-container {
            margin: 10px 25px;
            padding: 8px 0;
        }
        .slider-container label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color:#e4d5b8;
            margin-bottom: 5px;
        }
        #slider { width: 100%; margin: 8px 0; }
        .ui-slider { background: #e0c48b; border-radius: 10px; height: 8px; }
        .ui-slider .ui-slider-handle {
            width: 6px; height: 6px;
            margin-left: 1px;
            background: #8b4513; border-radius: 50%;
            border: none; cursor: pointer;
            top: 0px;
        }
        .ui-slider .ui-slider-range { background: #d4af37; border-radius: 10px; }
        .ui-slider .ui-slider-handle:focus { outline: none; }

        .hidden { display: none; }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 768px) {
            .main-content { padding-left: 70px !important; }
            .side-nav-global { left: 6px !important; padding: 8px 6px; gap: 4px; }
            .side-nav-global a { width: 36px; height: 36px; padding: 6px 8px; font-size: 16px; }
            .side-nav-global a i { font-size: 16px; }
            .side-nav-global a .tooltip { font-size: 11px; left: 48px; padding: 4px 10px; }
            .sidebar-at { width: 200px; height: 600px; left: 6px; }
            .menu-toggle { width: 16px; height: 60px; font-size: 1rem; }
            .menu-toggle:hover { width: 30px; }
            .sidebar-at h3 { font-size: 0.9rem; padding: 15px; }
            .livros-lista li { padding: 8px 10px 8px 18px; }
            .livros-lista li a { font-size: 0.75rem; }
            .apologetic-panel { width: 100%; max-height: 250px; position: static; }
            .apologetic-wrapper { flex-direction: column; }
            .page-title-bar { flex-direction: column; align-items: stretch; text-align: center; }
            .page-title-bar .nav-buttons { justify-content: center; flex-wrap: wrap; }
            .page-title-bar .livro-atual { min-width: 100px; font-size: 1rem; }
        }
        @media (max-width: 480px) {
            .main-content { padding-left: 60px !important; }
            .side-nav-global { left: 4px !important; padding: 6px 4px; border-radius: 12px; }
            .side-nav-global a { width: 32px; height: 32px; padding: 4px 6px; font-size: 14px; }
            .side-nav-global a i { font-size: 14px; }
            .side-nav-global a .tooltip { font-size: 10px; left: 40px; padding: 3px 8px; }
            .sidebar-at { width: 160px; height: 500px; left: 4px; }
            .menu-toggle { width: 14px; height: 50px; font-size: 0.8rem; }
            .menu-toggle:hover { width: 25px; }
            .livros-lista li { padding: 6px 8px 6px 14px; }
            .livros-lista li a { font-size: 0.7rem; }
            .page-title-bar .livro-atual { min-width: 80px; font-size: 0.9rem; }
            .page-title-bar .nav-btn { font-size: 0.7rem; padding: 4px 10px; }
        }

        .testamento-indicator {
            font-size: 0.7rem;
            color: #d4af37;
            opacity: 0.7;
            display: block;
            margin-top: 4px;
        }
    </style>
</head>

        atualizarPainelApologetico(capituloAtual);
        return;
    }
    
    // Se não houver capituloAtual, tenta obter da página atual
    const pageAtual = flipbookManager ? flipbookManager.getPaginaAtual() : 1;
    let capEncontrado = null;
    
    // Procura o capítulo correspondente à página atual
    for (let [cap, pagina] of Object.entries(capituloParaPagina)) {
        if (parseInt(pageAtual) === parseInt(pagina) || parseInt(pageAtual) === parseInt(pagina) + 1) {
            capEncontrado = cap;
            break;
        }
    }
    
    // Se não encontrou pela página, tenta pegar o primeiro capítulo disponível
    if (!capEncontrado && dadosAtuais) {
        const capitulos = Object.keys(dadosAtuais).sort((a,b)=>Number(a)-Number(b));
        if (capitulos.length > 0) {
            capEncontrado = capitulos[0];
        }
    }
    
    if (capEncontrado) {
        capituloAtual = capEncontrado;
        atualizarPainelApologetico(capEncontrado);
    } else {
        // Se ainda não tiver dados, mostra mensagem padrão
        document.getElementById('panel-conteudo').innerHTML = `
            <div class="status">Aguardando carregamento do capítulo</div>
        `;
    }
}

class TextPaginator {
    constructor(medidorId, alturaMax) {
        this.medidor = document.getElementById(medidorId);
        this.alturaMax = alturaMax;
    }
    calcularAltura(html) {
        this.medidor.innerHTML = html;
        const altura = this.medidor.scrollHeight;
        this.medidor.innerHTML = "";
        return altura;
    }
    dividirEmColunas(versiculos) {
        let index = 0;
        const paginas = [];
        while (index < versiculos.length) {
            const colEsq = [], colDir = [];
            let altEsq = 0, altDir = 0;
            while (index < versiculos.length) {
                const html = `<div class="versiculo">${versiculos[index]}</div>`;
                const altura = this.calcularAltura(html);
                if (altEsq + altura <= this.alturaMax) {
                    colEsq.push(versiculos[index]);
                    altEsq += altura;
                    index++;
                } else break;
            }
            while (index < versiculos.length) {
                const html = `<div class="versiculo">${versiculos[index]}</div>`;
                const altura = this.calcularAltura(html);
                if (altDir + altura <= this.alturaMax) {
                    colDir.push(versiculos[index]);
                    altDir += altura;
                    index++;
                } else break;
            }
            paginas.push({ esq: colEsq, dir: colDir, isContinuacao: paginas.length > 0 });
        }
        return paginas;
    }
}

        let paginas = [this.gerarCapa(), this.gerarVersoCapa()];
        const { paginas: paginasConteudo, ultimaPagina } = this.gerarPaginasConteudo();
        paginas.push(...paginasConteudo);
        if (paginasConteudo.length % 2 !== 0) {
            const proximoNumero = ultimaPagina + 1;
            paginas.push(this.gerarPaginaBranca(proximoNumero));
        }
        paginas.push(this.gerarAnteverso(), this.gerarContracapa());
        return paginas;
    }
    getMapaCapituloPagina() {
        return this.capituloPaginaMap;
    }
}

class FlipbookManager {
    constructor(seletor, largura, altura) {
        this.container = $(seletor);
        this.largura = largura;
        this.altura = altura;
        this.flipbook = null;
        this.isChrome = () => navigator.userAgent.indexOf('Chrome') != -1;
    }
    carregar(paginasHtml, paginaInicial = 1) {
        if (this.flipbook) {
            try { 
                this.flipbook.turn('destroy'); 
            } catch(e) {}
            this.flipbook = null;
        }
        
        this.container.empty();
        paginasHtml.forEach(html => this.container.append(html));
        
        this.flipbook = this.container.turn({
            width: this.largura, 
            height: this.altura, 
            autoCenter: true, 
            display: 'double',
            acceleration: !this.isChrome(),
            gradients: true, 
            elevation: 50,
            when: { 
                turning: (e, page, view) => {
                    var book = $(this.flipbook);
                    var pages = book.turn('pages');
                    
                    if (page >= 2) {
                        $('.ej-book .front-side').addClass('fixed');
                    } else {
                        $('.ej-book .front-side').removeClass('fixed');
                    }
                    if (page < pages) {
                        $('.ej-book .back-side').addClass('fixed');
                    } else {
                        $('.ej-book .back-side').removeClass('fixed');
                    }
                    
                    this.updateDepth(page);
                },
                turned: (e, page) => {
                    this.onTurn(page);
                }
            }
        });
        
        setTimeout(() => {
            if (this.flipbook) {
                try { 
                    this.flipbook.turn('page', paginaInicial);
                    const total = this.flipbook.turn('pages');
                    this.onTurn(paginaInicial);
                } catch(e) {}
            }
        }, 200);
    }
    
    onTurn(page) {
        if (!this.flipbook) return;
        const total = this.flipbook.turn('pages');
        
        $('#scroll-left').toggleClass('hidden', page <= 1);
        $('#scroll-right').toggleClass('hidden', page >= total);
        
        $('#pagina-atual-slider').text(page);
        $('#pagina-total-slider').text(total);
        
        if ($('#slider').data('uiSlider')) {
            $('#slider').slider('option', 'max', total);
            $('#slider').slider('value', page);
        }
        
        this.updateDepth(page);
        
        if (typeof atualizarPaineisPorPagina === 'function') {
            atualizarPaineisPorPagina(page);
        }
    }
    
    updateDepth(page) {
        if (!this.flipbook) return;
        const pages = this.flipbook.turn('pages');
        if (!pages) return;
        
        const front = $('.ej-book .front-side .depth');
        if (front.length) {
            let w = 16 * Math.min(1, page * 2 / pages);
            if (page > 3) {
                front.css({ width: w + 'px', left: (20 - w) + 'px' });
            } else {
                front.css({ width: '0px', left: '0px' });
            }
        }
        
        const back = $('.ej-book .back-side .depth');
        if (back.length) {
            let w = 16 * Math.min(1, (pages - page) * 2 / pages);
            if (page < pages - 3) {
                back.css({ width: w + 'px', right: (20 - w) + 'px' });
            } else {
                back.css({ width: '0px', right: '0px' });
            }
        }
    }
    
    irParaPagina(num) { 
        if (this.flipbook) { 
            this.flipbook.turn('page', num);
        }
    }
    
    proximo() { if (this.flipbook) { this.flipbook.turn('next'); } }
    anterior() { if (this.flipbook) { this.flipbook.turn('previous'); } }
    primeiraPagina() { if (this.flipbook) { this.flipbook.turn('page', 1); } }
    ultimaPagina() { if (this.flipbook) { 
        const total = this.flipbook.turn('pages');
        this.flipbook.turn('page', total);
    }}
    
    getPaginaAtual() {
        return this.flipbook ? this.flipbook.turn('page') : 1;
    }
}

let flipbookManager = null;
let dadosAtuais = null;
let capituloParaPagina = {};
let carregandoLivro = false;
let nomeLivroAtual = "";
let dadosApologeticosAtuais = {};
let capituloAtual = null;
const paginator = new TextPaginator('medidor', CONFIG.LIMITE_ALTURA);

// ======================== FUNÇÕES APOLOGÉTICAS ========================
function atualizarPaineisPorPagina(page) {
    capituloAtual = null;
    for (let [cap, pagina] of Object.entries(capituloParaPagina)) {
        if (parseInt(page) === parseInt(pagina) || parseInt(page) === parseInt(pagina) + 1) {
            capituloAtual = cap;
            break;
        }
    }
    
    if (capituloAtual) {
        atualizarPainelApologetico(capituloAtual);
    }
}

function atualizarPainelApologetico(cap) {
    const panelContent = document.getElementById('panel-conteudo');
    const dados = dadosApologeticosAtuais[cap];
    
    if (!dados) {
        const msg = `
            <div class="capitulo-titulo">
                <i class="fas fa-book"></i> ${nomeLivroAtual} ${cap}
            </div>
            <div class="status">
                <i class="fas fa-info-circle"></i><br>
                Conteúdo apologético para ${nomeLivroAtual} ${cap}
            </div>
        `;
        panelContent.innerHTML = msg;
        return;
    }
    
    // Se o painel estiver no modo "defesa", mostra Defesa da Fé
    if (painelModo === "defesa") {
        let html = `<div class="capitulo-titulo">
            <i class="fas fa-shield-alt"></i> Defesa da Fé - ${nomeLivroAtual} ${cap}
        </div>`;
        
        if (dados.tema_apologetico) {
            html += `<div class="panel-section">
                <h4><i class="fas fa-shield-alt"></i> Tema Apologético</h4>
                <p style="line-height:1.4; font-size:0.75rem;">${dados.tema_apologetico}</p>
            </div>`;
        }
        
        if (dados.titulo || dados.resumo) {
            html += `<div class="panel-section">
                <h4><i class="fas fa-star-of-life"></i> ${dados.titulo || 'Tema do Capítulo'}</h4>
                <p style="line-height:1.4; font-size:0.75rem;">${dados.resumo || ''}</p>
            </div>`;
        }
        
        if (dados.objecoes && dados.objecoes.length) {
            html += `<div class="panel-section"><h4><i class="fas fa-question-circle"></i> Objeções & Respostas</h4>`;
            dados.objecoes.forEach(obj => {
                html += `
                    <div class="objecao-item">
                        <div class="objecao-questao"><i class="fas fa-comment-dots"></i> ${obj.questao}</div>
                        <div class="objecao-resposta"><i class="fas fa-shield-alt"></i> ${obj.resposta}</div>
                    </div>
                `;
            });
            html += `</div>`;
        }
        
        if (dados.evidencias_historicas && dados.evidencias_historicas.length) {
            html += `<div class="panel-section"><h4><i class="fas fa-church"></i> Evidências Históricas</h4>`;
            dados.evidencias_historicas.forEach(ev => {
                html += `<div class="evidencia-item"><i class="fas fa-check-circle"></i> ${ev}</div>`;
            });
            html += `</div>`;
        }
        
        panelContent.innerHTML = html;
    } else {
        // Modo "ferramentas"
        let html = `<div class="capitulo-titulo">
            <i class="fas fa-tools"></i>Ferramentas - ${nomeLivroAtual} ${cap}
        </div>`;
        
        if (dados.argumentos && dados.argumentos.length) {
            html += `<div class="panel-section"><h4><i class="fas fa-brain"></i> Argumentos</h4>`;
            dados.argumentos.forEach(arg => {
                html += `
                    <div class="argumento-item">
                        <div class="argumento-tipo"><i class="fas fa-microscope"></i> ${arg.tipo}</div>
                        <div style="font-size:0.75rem;">${arg.descricao}</div>
                    </div>
                `;
            });
            html += `</div>`;
        }
        
        if (dados.referencias_cruzadas && dados.referencias_cruzadas.length) {
            html += `<div class="panel-section"><h4><i class="fas fa-link"></i> Referências Cruzadas</h4>`;
            dados.referencias_cruzadas.forEach(ref => {
                html += `
                    <div class="referencia-item">
                        <strong>📖 ${ref.referencia}</strong><br>
                        <small style="font-size:0.7rem;">${ref.descricao}</small>
                    </div>
                `;
            });
            html += `</div>`;
        }
        
        if (dados.versiculos_chave && dados.versiculos_chave.length) {
            html += `<div class="panel-section"><h4><i class="fas fa-star"></i> Versículos-Chave</h4>`;
            dados.versiculos_chave.forEach(vc => {
                let texto = vc.texto;
                if (texto.length > 120) texto = texto.substring(0, 120) + '…';
                html += `
                    <div class="versiculo-chave">
                        <strong>${vc.referencia}</strong>
                        "${texto}"
                    </div>
                `;
            });
            html += `</div>`;
        }
        
        if (dados.aplicacoes && dados.aplicacoes.length) {
            html += `<div class="panel-section"><h4><i class="fas fa-heart"></i> Aplicações</h4>`;
            dados.aplicacoes.forEach(ap => {
                html += `<div class="aplicacao-item"><i class="fas fa-check-circle"></i> ${ap}</div>`;
            });

        }
        
        if (html === `<div class="capitulo-titulo">
            <i class="fas fa-tools"></i>Ferramentas - ${nomeLivroAtual} ${cap}
        </div>`) {
            html += `<div class="status">Conteúdo disponível em breve</div>`;
        }
        
        panelContent.innerHTML = html;
    }
}

function atualizarPainelGenerico() {
    if (capituloAtual) {
        atualizarPainelApologetico(capituloAtual);
    }
}

// ======================== CARREGAMENTO DE LIVRO EXTERNO ========================
function atualizarBotoesNavegacaoLivro(livroId) {
    const currentIndex = LIVROS_ORDEM_COMPLETA.indexOf(livroId);
    if (currentIndex === -1) return;
    
    const $btnAnterior = $('#btn-anterior-livro');
    const $btnProximo = $('#btn-proximo-livro');
    
    if (currentIndex <= 0) {
        $btnAnterior.addClass('hidden-nav');
    } else {
        $btnAnterior.removeClass('hidden-nav');
    }
    
    if (currentIndex >= LIVROS_ORDEM_COMPLETA.length - 1) {
        $btnProximo.addClass('hidden-nav');
    } else {
        $btnProximo.removeClass('hidden-nav');
    }
}

function carregarLivroExterno(livroId) {
    return new Promise((resolve, reject) => {
        const oldScript = document.querySelector(`script[data-livro="${livroId}"]`);
        if (oldScript) oldScript.remove();
        const script = document.createElement('script');
        script.src = `apolo/${livroId}.js`;
        script.dataset.livro = livroId;
        script.onload = () => {
            if (window.LIVRO_DATA && window.LIVRO_DATA.dados) {
                resolve(window.LIVRO_DATA);
            } else {
                reject(new Error(`Formato inválido em apolo/${livroId}.js`));
            }
        };
        script.onerror = () => reject(new Error(`Não foi possível carregar apolo/${livroId}.js`));
        document.head.appendChild(script);
    });
}

async function mudarLivro(livroId, paginaDestino = 1) {
    if (carregandoLivro) return;
    carregandoLivro = true;
    $('#searchResults').removeClass('show');
    $('#searchInput').val('');
    $('#livro-nome').text('Carregando...');
    
    atualizarBotoesNavegacaoLivro(livroId);
    
    try {
        const livroData = await carregarLivroExterno(livroId);
        dadosAtuais = livroData.dados;
        dadosApologeticosAtuais = livroData.apologetica || {};
        nomeLivroAtual = livroData.nome || livroId.charAt(0).toUpperCase() + livroId.slice(1);
        $('#livro-nome').text(nomeLivroAtual);
        
        const builder = new PageBuilder(nomeLivroAtual, dadosAtuais, paginator);
        const paginasHtml = builder.gerarTodasPaginas();
        capituloParaPagina = builder.getMapaCapituloPagina();
        
        if (!flipbookManager) {
            flipbookManager = new FlipbookManager('.ej-book', CONFIG.LARGURA, CONFIG.ALTURA);
        }
        flipbookManager.carregar(paginasHtml, paginaDestino);
        
        atualizarBotoesNavegacaoLivro(livroId);
        
        // Busca o capítulo correspondente à página atual (ou o primeiro)
        const pageAtual = flipbookManager.getPaginaAtual();
        let capEncontrado = null;
        for (let [cap, pagina] of Object.entries(capituloParaPagina)) {
            if (parseInt(pageAtual) === parseInt(pagina) || parseInt(pageAtual) === parseInt(pagina) + 1) {
                capEncontrado = cap;
                break;
            }
        }
        
        if (!capEncontrado) {
            const primeiroCap = Object.keys(dadosAtuais).sort((a,b)=>Number(a)-Number(b))[0];
            capEncontrado = primeiroCap;
        }
        
        if (capEncontrado) {
            capituloAtual = capEncontrado;
            // Mantém o estado atual do painel
            if (painelModo === "defesa") {
                document.getElementById('panelHeader').innerHTML = `
                    <span><i class="fas fa-shield-alt"></i> Defesa da Fé</span>
                    <span class="panel-indicator"></span>
                    <i class="fas fa-exchange-alt panel-toggle-icon"></i>
                `;
            } else {
                document.getElementById('panelHeader').innerHTML = `
                    <span><i class="fas fa-tools"></i> Ferramentas Apologéticas</span>
                    <span class="panel-indicator"></span>
                    <i class="fas fa-exchange-alt panel-toggle-icon"></i>
                `;
            }
            atualizarPainelApologetico(capEncontrado);
        }
        
    } catch (err) {
        console.error(err);
        $('#livro-nome').text('Erro');
        $('.ej-book').html(`<div class="status">Erro ao carregar livro: ${err.message}<br>Verifique se o arquivo apolo/${livroId}.js existe.</div>`);
    } finally {
        carregandoLivro = false;
    }
}

function buscarNoLivroAtual(termo) {
    if (!dadosAtuais) return [];
    const resultados = [];
    const termoLower = termo.toLowerCase();
    
    const refMatch = termo.match(/^(\d*\s*[a-záàâãéèêíïóôõöúçñ]+)\s+(\d+):(\d+)$/i);
    if (refMatch) {
        const livroRef = refMatch[1].toLowerCase().trim();
        const capRef = refMatch[2];
        const versRef = parseInt(refMatch[3]);
        
        if (livroRef === nomeLivroAtual.toLowerCase()) {
            if (dadosAtuais[capRef] && dadosAtuais[capRef][versRef - 1]) {
                resultados.push({
                    cap: capRef,
                    vers: versRef,
                    texto: dadosAtuais[capRef][versRef - 1].substring(0, 120) + (dadosAtuais[capRef][versRef - 1].length > 120 ? '…' : '')
                });
            }
        }
    } else {
        for (let cap in dadosAtuais) {
            if (dadosAtuais.hasOwnProperty(cap) && Array.isArray(dadosAtuais[cap])) {
                for (let idx = 0; idx < dadosAtuais[cap].length; idx++) {
                    const texto = dadosAtuais[cap][idx];
                    if (texto && texto.toLowerCase().includes(termoLower)) {
                        resultados.push({ 
                            cap, 
                            vers: idx + 1, 
                            texto: texto.substring(0, 120) + (texto.length > 120 ? '…' : '') 
                        });
                    }
                }
            }
            if (resultados.length > 30) break;
        }
    }
    return resultados;
}

function executarBusca() {
    const termo = $('#searchInput').val().trim();
    if (!termo) {
        alert('Digite um termo para buscar ou uma referência (ex: João 3:16)');
        return;
    }
    
    if (!dadosAtuais) {
        alert('Aguardando carregamento do livro...');
        return;
    }
    
    const resultados = buscarNoLivroAtual(termo);
    const $results = $('#searchResults');
    $results.empty();
    
    if (resultados.length === 0) {
        $results.append('<div class="search-result-item">Nenhum versículo encontrado.</div>');
    } else {
        resultados.forEach(r => {
            $results.append(`<div class="search-result-item" data-cap="${r.cap}" data-vers="${r.vers}">
                <span class="result-ref">${nomeLivroAtual} ${r.cap}:${r.vers}</span><br>
                <small>${r.texto}</small>
            </div>`);
        });
    }
    $results.addClass('show');
}

function navegarParaLivro(delta) {
    const novoIndex = livroAtualIndex + delta;
    if (novoIndex >= 0 && novoIndex < LIVROS_ORDEM_COMPLETA.length) {
        livroAtualIndex = novoIndex;
        mudarLivro(LIVROS_ORDEM_COMPLETA[livroAtualIndex], 1);
    }
}

// ======================== INICIALIZAÇÃO ========================
$(document).ready(function() {
    // Gera o menu inicial
    gerarMenu();
    
    // Inicializa com o menu global visível
    toggleMenuLivros(false);
    
    // Inicializa o painel no modo Defesa da Fé
    painelModo = "defesa";
    document.getElementById('panelHeader').innerHTML = `
        <span><i class="fas fa-shield-alt"></i> Defesa da Fé</span>
        <span class="panel-indicator"></span>
        <i class="fas fa-exchange-alt panel-toggle-icon"></i>
    `;
    
    // Toggle do menu de livros
    $('#menuToggle').click(function() {
        toggleMenuLivros(!menuLivrosAberto);
    });
    
    // Alternar testamento clicando no título
    $('#titulo-testamento').click(function() {
        alternarTestamento();
    });
    
    // Tecla ESC fecha o menu de livros
    $(document).keydown(function(e) {
        if (e.key === 'Escape') {
            if (menuLivrosAberto) {
                toggleMenuLivros(false);
            }
        }
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
            e.preventDefault();
        }
    });
    
    // Navegação por setas com debounce
    let teclaPressionada = false;
    $(document).keydown(function(e) {
        if (teclaPressionada) {
            e.preventDefault();
            return;
        }
        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            teclaPressionada = true;
            flipbookManager?.anterior();
            setTimeout(() => { teclaPressionada = false; }, 300);
            return;
        }
        if (e.key === 'ArrowRight') {
            e.preventDefault();
            teclaPressionada = true;
            flipbookManager?.proximo();
            setTimeout(() => { teclaPressionada = false; }, 300);
            return;
        }
    });
    $(document).keyup(function(e) {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
            teclaPressionada = false;
        }
    });
    
    // Fechar menu ao clicar fora
    $(document).click(function(e) {
        if (!$(e.target).closest('#sidebarAT, #menuToggle')) {
            if (menuLivrosAberto) {
                toggleMenuLivros(false);
            }
        }
    });
    
    $("#slider").slider({
        min: 1,
        max: 1,
        value: 1,
        slide: function(e, ui) {
            if (flipbookManager) {
                flipbookManager.irParaPagina(ui.value);
            }
        }
    });
    
    $('#btn-primeira-pagina').click(() => flipbookManager?.primeiraPagina());
    $('#btn-ultima-pagina').click(() => flipbookManager?.ultimaPagina());
    $('#btn-pagina-anterior').click(() => flipbookManager?.anterior());
    $('#btn-proxima-pagina').click(() => flipbookManager?.proximo());
    
    $('#page-input').on('change', function() {
        let pagina = parseInt($(this).val());
        const total = parseInt($('#total-paginas').text());
        if (isNaN(pagina)) pagina = 1;
        if (pagina < 1) pagina = 1;
        if (pagina > total) pagina = total;
        $(this).val(pagina);
        if (flipbookManager) {
            flipbookManager.irParaPagina(pagina);
        }
    });
    
    livroAtualIndex = LIVROS_ORDEM_COMPLETA.indexOf('genesis');
    setTimeout(function() {
        mudarLivro('genesis', 1);
    }, 50);
    
    $('#btn-anterior-livro').click(() => navegarParaLivro(-1));
    $('#btn-proximo-livro').click(() => navegarParaLivro(1));
    $('#scroll-left').click(() => flipbookManager?.anterior());
    $('#scroll-right').click(() => flipbookManager?.proximo());
    
    $('#searchBtn').click(executarBusca);
    $('#searchInput').keypress(function(e) {
        if (e.which === 13) {
            executarBusca();
        }
    });
    
    $(document).on('click', '.search-result-item', function() {
        const cap = $(this).data('cap');
        const paginaDestino = capituloParaPagina[cap];
        if (paginaDestino && flipbookManager) {
            flipbookManager.irParaPagina(paginaDestino);
            $('#searchResults').removeClass('show');
            $('#searchInput').val('');
            capituloAtual = cap;
            atualizarPainelApologetico(cap);
        } else {
            alert(`Não foi possível localizar o capítulo ${cap}.`);
        }
    });
    
    $(document).click(e => {
        if (!$(e.target).closest('.search-bar, .search-results').length)
            $('#searchResults').removeClass('show');
    });
});
